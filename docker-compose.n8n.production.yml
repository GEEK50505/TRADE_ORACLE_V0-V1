services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: trade-oracle-n8n-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    env_file:
      - .env.n8n.production
    environment:
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: trade-oracle-cloudflared
    restart: unless-stopped
    depends_on:
      n8n:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  n8n_data:
