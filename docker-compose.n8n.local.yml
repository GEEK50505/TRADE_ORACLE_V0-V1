services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: trade-oracle-n8n-local
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    env_file:
      - .env.n8n.local
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
